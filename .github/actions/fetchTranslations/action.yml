name: 'Fetch translations'

description: 'Import translations from the crowdinRegistration repo to an add-on'

inputs:
  path:
    description: 'Path to store the crowdinRegistration repo'
    required: true
    default: 'crowdinRegistration'
  addonRepoName:
    description: 'The name of the add-on repository'
    required: true
    default: ${{ github.event.repository.name }}


runs:
  using: "composite"
  steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        repository: nvdaaddons/crowdinRegistration
        path: ${{ inputs.path }}
    - name: Commit and push add-on with translations
      id: commit
      shell: pwsh
      run: |
        if (Test-Path addon) {
          Remove-Item -Recurse -Force addon
        }
        New-Item -ItemType Directory -Path addon | Out-Null
        
        $docPath = "${{ inputs.path }}/shared/${{ inputs.addonRepoName }}/doc"
        if (Test-Path $docPath) {
          Move-Item -Path $docPath -Destination addon -Force
        } else {
          Write-Host "No translated documentation for this add-on"
        }
        
        $localePath = "${{ inputs.path }}/shared/${{ inputs.addonRepoName }}/locale"
        if (Test-Path $localePath) {
          Move-Item -Path $localePath -Destination addon -Force
        } else {
          Write-Host "No translated interface messages for this add-on"
        }
        
        git config --local user.name github-actions
        git config --local user.email github-actions@github.com
        git add --ignore-removal addon
        git diff --staged --quiet
        if ($LASTEXITCODE -eq 0) {
          Write-Host "Nothing added to commit."
        } else {
          git status
          git commit -m "Update translations from Crowdin"
          git push
        }
