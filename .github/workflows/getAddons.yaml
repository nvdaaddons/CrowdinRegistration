name: Get add-ons
on:
  workflow_dispatch:
jobs:
  get-addons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Get add-ons
        run: |
          curl -sS https://addonStore.nvaccess.org/en/all/latest.json | jq 'map({(.addonId): (.sourceURL | split("/") | .[:5] | join("/"))}) | add' > addons.json
          cat addons.json
      
      - name: Clone add-on repositories
        run: |
          mkdir -p tempAddon
          jq -r 'to_entries | .[] | "\(.key) \(.value)"' addons.json | while read addonId repoUrl; do
            echo "Cloning $addonId from $repoUrl"
            git clone --depth 1 "$repoUrl" "tempAddon/$addonId" || echo "Failed to clone $addonId"
          done
          
          echo "Cloned repositories:"
          ls -la tempAddon/
      
      - name: Download l10nSources folders
        run: |
          mkdir -p l10nSources
          jq -r 'to_entries | .[] | "\(.key) \(.value)"' addons.json | while read addonId repoUrl; do
            echo "Processing $addonId from $repoUrl"
            
            # Extract owner and repo from URL
            owner=$(echo $repoUrl | cut -d'/' -f4)
            repo=$(echo $repoUrl | cut -d'/' -f5)
            
            # Download l10nSources folder using GitHub API
            api_url="https://api.github.com/repos/$owner/$repo/contents/l10nSources"
            
            # Download files from l10nSources folder
            curl -sS "$api_url" | jq -r '.[] | select(.type=="file") | .download_url' | while read file_url; do
              if [ -n "$file_url" ]; then
                # Create addon directory only when we have files to download
                mkdir -p "l10nSources/$addonId"
                filename=$(basename "$file_url")
                echo "  Downloading $filename"
                curl -sS "$file_url" -o "l10nSources/$addonId/$filename"
              fi
            done
          done
      
      - name: Download l10nUtil.exe from nvaccess/nvdaL10n
        run: |
          gh release download -R nvaccess/nvdaL10n --pattern "l10nUtil.exe" -D l10nUtil
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      
      - name: Upload l10nSources to Crowdin
        env:
          crowdinProjectID: ${{ vars.CROWDIN_ID }}
          crowdinAuthToken: ${{ secrets.CROWDIN_TOKEN }}
        run: |
          # Upload each downloaded file to Crowdin with delay to avoid rate limits
          find l10nSources -type f | while read file; do
            echo "Uploading $file to Crowdin"
            uv run ./utils/crowdinSync.py uploadSourceFile "$file"
            
            # Sleep for 2 seconds between uploads to avoid rate limits
            sleep 5
          done
          