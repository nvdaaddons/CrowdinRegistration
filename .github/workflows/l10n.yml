name: Export translations from Crowdin, and upload source files
on:
  schedule:
    - cron: '0 1 * * 1'  # Every Monday at 1:00 AM UTC (minute hour day month weekday)
  workflow_dispatch:
env:
  crowdinAuthToken: ${{ secrets.CROWDIN_TOKEN }}
  
jobs:
  l10n:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Download l10nUtil.exe from nvaccess/nvdaL10n
        run: |
          # Download the latest release asset matching the pattern from the specified repository
          gh release download -R github.com/nvaccess/nvdaL10n -p "l10nUtil.exe" -D .
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Export translations
        run: |
          ./l10nUtil.exe exportTranslations -o ./l10n -c addon
      - name: Push exported translations
        run: |
          git config --local user.name github-actions
          git config --local user.email github-actions@github.com
          git add l10n
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit"
          } else {
            Write-Host "Pushing changes to repository..."
            git commit -m "Update translations from Crowdin"
            git push
          }
      - name: Install gettext
        run: |
          choco install -y gettext
          # Add gettext to PATH for current and future steps
          $gettextPath = "C:\Program Files\gettext-iconv\bin"
          echo "$gettextPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Get add-ons
        run: |
          try {
            $response = Invoke-RestMethod -Uri 'https://addonStore.nvaccess.org/en/all/latest.json' -ErrorAction Stop
            # Security: Validate response is an array before processing
            if ($response -isnot [array]) {
              throw "Invalid response format from addon store"
            }
            $response | ConvertTo-Json -Depth 100 -Compress | jq 'map({(.addonId): (.sourceURL | split("/") | .[:5] | join("/"))}) | add' > addons.json
            Get-Content addons.json
          } catch {
            Write-Error "Failed to fetch add-ons from store: $_"
            exit 1
          }
      
      - name: Clone and process each add-on
        continue-on-error: true
        run: |
          $addons = jq -r 'to_entries | .[] | "\(.key)|\(.value)"' addons.json
          
          # Initialize counters for uploaded files
          $potFilesUploaded = 0
          $xliffFilesUploaded = 0
          
          foreach ($line in $addons) {
            $addonId, $repoUrl = $line -split '\|', 2
            
            # ============================================
            # Validate add-on ID and repository URL
            # ============================================
            if ($addonId -notmatch '^[a-zA-Z0-9_-]+$') {
              Write-Warning "Skipping invalid addon ID: $addonId"
              continue
            }
            
            if ($repoUrl -notmatch '^https://github\.com/[a-zA-Z0-9_-]+/[a-zA-Z0-9._-]+$') {
              Write-Warning "Skipping invalid repository URL: $repoUrl"
              continue
            }
            
            Write-Host "`n=========================================="
            Write-Host "Processing: $addonId"
            Write-Host "Repository: $repoUrl"
            Write-Host "==========================================`n"
            
            # ============================================
            # Clone repository
            # ============================================
            $tempPath = "tempAddon\$addonId"
            if (Test-Path $tempPath) {
              Write-Host "  Removing existing clone..."
              Remove-Item -Recurse -Force $tempPath
            }
            
            Write-Host "  Cloning stable branch with submodules..."
            git clone --depth 1 --recurse-submodules --branch stable $repoUrl $tempPath
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "  Failed to clone $addonId (stable branch may not exist)"
              continue
            }
            Write-Host "  ✓ Clone successful"
            
            # ============================================
            # Process add-on files
            # ============================================
            Push-Location $tempPath
            uv sync
            Start-Sleep -Seconds 2 # Short delay to ensure filesystem is ready
            try {
              # Generate .pot file
              Write-Host "`n  Generating translation template (.pot file)..."
              uv run scons pot
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "  scons pot failed for $addonId"
              } else {
                Write-Host "  ✓ .pot file generated"
                
                # Upload .pot file to Crowdin
                $potFile = "$addonId.pot"
                if (Test-Path $potFile) {
                  Write-Host "  Uploading $potFile to Crowdin..."
                  & ..\..\l10nUtil.exe uploadSourceFile $potFile -c addon
                  if ($LASTEXITCODE -eq 0) {
                    Write-Host "  ✓ $potFile uploaded successfully"
                    $potFilesUploaded++
                    # Delay to avoid Crowdin API rate limits
                    Start-Sleep -Seconds 3
                  } else {
                    Write-Warning "  Failed to upload $potFile"
                  }
                } else {
                  Write-Warning "  $potFile not found after scons pot"
                }
              }
              
              # Process documentation file
              Write-Host "`n  Processing documentation file..."
              if (Test-Path "readme.md") {
                Write-Host "  Generating $addonId.xliff..."
                uv run python ...\.github\workflows\markdownTranslate.py generateXliff -m readme.md -o "$addonId.xliff"
                if ($LASTEXITCODE -ne 0) {
                  Write-Warning "  xliff generation failed for $addonId"
                } else {
                  Write-Host "  ✓ .xliff file generated"
                  
                  # Upload .xliff file to Crowdin
                  $xliffFile = "$addonId.xliff"
                  if (Test-Path $xliffFile) {
                    Write-Host "  Uploading $xliffFile to Crowdin..."
                    & ..\..\l10nUtil.exe uploadSourceFile $xliffFile -c addon
                    if ($LASTEXITCODE -eq 0) {
                      Write-Host "  ✓ $xliffFile uploaded successfully"
                      $xliffFilesUploaded++
                      # Delay to avoid Crowdin API rate limits
                      Start-Sleep -Seconds 3
                    } else {
                      Write-Warning "  Failed to upload $xliffFile"
                    }
                  } else {
                    Write-Warning "  $xliffFile not found after xliff generation"
                  }
                }
              } else {
                Write-Warning "  readme.md not found in $addonId"
              }
              Write-Host "`n  ✓ Finished processing $addonId"
              
            } finally {
              Pop-Location

            }
          }
          
          Write-Host "`n=========================================="
          Write-Host "WORKFLOW SUMMARY"
          Write-Host "=========================================="
          Write-Host "✓ Uploaded $potFilesUploaded POT files (translation templates) to Crowdin"
          Write-Host "✓ Uploaded $xliffFilesUploaded XLIFF files (documentation) to Crowdin"
          Write-Host "✓ This workflow uses 'continue-on-error' behavior - it won't fail if some add-ons cannot be processed"
          Write-Host "✓ Check the logs above for any warnings about skipped or failed add-ons"
          Write-Host "==========================================`n"
      - name: Pull latest changes
        run: git pull
      - name: Transform l10n to shared folder
        run: |
          if (Test-Path shared) {
            Write-Host "Warning: folder already exists"
          } else {
            New-Item -ItemType Directory -Path shared | Out-Null
          }
          
          Get-ChildItem -Path l10n -Directory | ForEach-Object {
            $addon = $_.Name
            Get-ChildItem -Path $_.FullName -Directory | ForEach-Object {
              $lang = $_.Name
              
              # Process .po file
              $poFile = "l10n/$addon/$lang/$addon.po"
              if (Test-Path $poFile) {
                $targetDir = "shared/$addon/locale/$lang/LC_MESSAGES"
                New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
                Move-Item -Path $poFile -Destination "$targetDir/nvda.po" -Force
              }
              
              # Process .xliff file - convert to markdown
              $xliffFile = "l10n/$addon/$lang/$addon.xliff"
              if (Test-Path $xliffFile) {
                $targetDir = "shared/$addon/doc/$lang"
                New-Item -ItemType Directory -Path $targetDir -Force | Out-Null
                $mdFile = "$targetDir/readme.md"
                
                Write-Host "Converting $xliffFile to $mdFile..."
                .\l10nUtil.exe xliff2md $xliffFile $mdFile
                if ($LASTEXITCODE -eq 0) {
                  Write-Host "✓ Successfully converted $xliffFile to markdown"
                } else {
                  Write-Warning "Failed to convert $xliffFile to markdown"
                }
              }
            }
          }
          
          Get-ChildItem -Recurse shared
      - name: Commit and push shared folder
        run: |
          git add shared
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Nothing added to commit."
          } else {
            git commit -m "Update shared folder"
            git push
          }
